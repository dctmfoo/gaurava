name: Feature / enhancement
description: A new capability or an improvement to an existing one.
labels: ["enhancement", "status:needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        For UI/UX redesign work (especially onboarding), use the **Design change** template instead — it captures the change-control trigger.
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What should be possible that isn't today, and why it matters.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes / approach
      description: Optional. Constraints, rough approach, alternatives considered.
    validations:
      required: false
  - type: textarea
    id: docs
    attributes:
      label: Related docs in this repo
      description: Link the governing plan/spec/brief under docs/ instead of restating it here.
      placeholder: "docs/…"
    validations:
      required: false
